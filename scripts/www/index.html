<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="filename" content="dazi_community_app.html">
    <title>搭子社区 - 沉浸式社交</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF385C',
                        secondary: '#3DE1AD',
                        dark: '#121212',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    },
                    animation: {
                        'bounce-subtle': 'bounceSubtle 2s infinite',
                        'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
                    },
                    keyframes: {
                        bounceSubtle: {
                            '0%, 100%': { transform: 'translateY(-5%)' },
                            '50%': { transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            font-family: 'Noto Sans SC', sans-serif;
        }
        /* 手机容器固定尺寸 */
        .app-shell {
            width: 375px;
            height: 812px;
            position: relative;
            background: #000;
            overflow: hidden;
            border-radius: 44px;
            box-shadow: 0 0 0 10px #1f1f1f, 0 0 40px rgba(0,0,0,0.8);
        }
        /* 滚动容器 */
        .feed-container {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .card {
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        
        .overlay-gradient {
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0) 100%);
        }

        .glass-info {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-gradient {
            background: linear-gradient(90deg, #FF385C 0%, #FF5A5F 100%);
            box-shadow: 0 8px 20px rgba(255, 56, 92, 0.3);
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background: #fff;
            border-radius: 2px;
        }

        /* 点赞气泡 */
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .heart-pop {
            position: absolute;
            animation: float-up 0.8s ease-out forwards;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <!-- 顶部 Tab 悬浮 -->
        <div class="absolute top-12 left-0 right-0 z-50 flex justify-center items-center gap-6 text-white/70 font-bold text-sm">
            <button class="relative hover:text-white transition-colors">关注</button>
            <button class="relative hover:text-white transition-colors tab-active text-white">推荐</button>
            <button class="relative hover:text-white transition-colors">最新</button>
            <button class="relative hover:text-white transition-colors">同城</button>
            <button class="absolute right-6 opacity-80">
                <i data-lucide="search" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- 内容流 -->
        <div class="feed-container" id="feed">
            <!-- 卡片 1 -->
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1551632811-561732d1e306?auto=format&fit=crop&w=812&q=80')">
                <div class="absolute inset-0 overlay-gradient"></div>
                
                <!-- 右侧操作区 -->
                <div class="absolute right-4 bottom-48 flex flex-col items-center gap-6 z-30">
                    <div class="flex flex-col items-center gap-1 group action-plus">
                        <div class="w-12 h-12 rounded-full glass-info flex items-center justify-center text-white active:scale-90 transition-transform">
                            <i data-lucide="heart" class="w-7 h-7"></i>
                        </div>
                        <span class="text-[11px] text-white font-medium">1.2w</span>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <div class="w-12 h-12 rounded-full glass-info flex items-center justify-center text-white active:scale-90 transition-transform">
                            <i data-lucide="message-circle" class="w-7 h-7"></i>
                        </div>
                        <span class="text-[11px] text-white font-medium">482</span>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <div class="w-12 h-12 rounded-full glass-info flex items-center justify-center text-white active:scale-90 transition-transform">
                            <i data-lucide="map-pin" class="w-7 h-7"></i>
                        </div>
                        <span class="text-[11px] text-white font-medium">同城</span>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <div class="w-12 h-12 rounded-full glass-info flex items-center justify-center text-white active:scale-90 transition-transform">
                            <i data-lucide="bookmark" class="w-7 h-7"></i>
                        </div>
                        <span class="text-[11px] text-white font-medium">收藏</span>
                    </div>
                    <div class="flex flex-col items-center opacity-40">
                        <i data-lucide="flag" class="w-5 h-5 text-white"></i>
                    </div>
                </div>

                <!-- 左下角信息层 -->
                <div class="absolute left-4 bottom-28 right-20 z-20">
                    <div class="glass-info rounded-2xl p-4 text-white">
                        <div class="flex items-center gap-3 mb-3">
                            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=100&q=80" class="w-10 h-10 rounded-full border-2 border-white/20" alt="avatar">
                            <div>
                                <div class="flex items-center gap-1">
                                    <span class="font-bold text-sm">阿强爱登山</span>
                                    <span class="bg-yellow-400 text-black text-[10px] px-1.5 py-0.5 rounded-full font-black">⭐ 4.8</span>
                                </div>
                                <p class="text-[10px] opacity-60">刚刚发布了动态</p>
                            </div>
                        </div>
                        <h2 class="text-xl font-black mb-2 tracking-tight">周六富士山徒步找搭子 🗻</h2>
                        <div class="flex flex-wrap gap-2 mb-3">
                            <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-md border border-white/10">#旅行</span>
                            <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-md border border-white/10">#徒步</span>
                            <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-md border border-white/10">#AA制</span>
                            <span class="text-[10px] px-2 py-0.5 bg-primary/20 text-primary border border-primary/30 rounded-md">女生优先</span>
                        </div>
                        <div class="space-y-1.5 text-xs opacity-90">
                            <div class="flex items-center gap-2">
                                <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                                <span>2026年3月5日 周六</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-secondary"></i>
                                <span>东京 · 新宿站集合</span>
                            </div>
                            <div class="flex justify-between items-center pt-2 mt-2 border-t border-white/10">
                                <span class="text-[11px]">已报名人数</span>
                                <span class="font-bold text-secondary">3/5 <span class="text-[10px] font-normal opacity-60">人</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 底部交互按钮 -->
                <div class="absolute bottom-10 left-4 right-4 z-30">
                    <button class="apply-btn w-full py-4 rounded-xl btn-gradient text-white font-black text-base flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <span>👉 立即申请加入</span>
                        <div class="w-2 h-2 rounded-full bg-white animate-ping-slow"></div>
                    </button>
                </div>
            </div>

            <!-- 卡片 2 -->
            <div class="card" style="background-image: url('https://images.unsplash.com/photo-1517457373958-b7bdd4587205?auto=format&fit=crop&w=812&q=80')">
                <div class="absolute inset-0 overlay-gradient"></div>
                
                <!-- 右侧操作区 -->
                <div class="absolute right-4 bottom-48 flex flex-col items-center gap-6 z-30">
                    <div class="flex flex-col items-center gap-1 action-plus">
                        <div class="w-12 h-12 rounded-full glass-info flex items-center justify-center text-white">
                            <i data-lucide="heart" class="w-7 h-7"></i>
                        </div>
                        <span class="text-[11px] text-white font-medium">8.4k</span>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <div class="w-12 h-12 rounded-full glass-info flex items-center justify-center text-white">
                            <i data-lucide="message-circle" class="w-7 h-7"></i>
                        </div>
                        <span class="text-[11px] text-white font-medium">128</span>
                    </div>
                    <div class="w-12 h-12 rounded-full glass-info flex items-center justify-center text-white">
                        <i data-lucide="map-pin" class="w-7 h-7"></i>
                    </div>
                </div>

                <!-- 左下角信息层 -->
                <div class="absolute left-4 bottom-28 right-20 z-20">
                    <div class="glass-info rounded-2xl p-4 text-white">
                        <div class="flex items-center gap-3 mb-3">
                            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=100&q=80" class="w-10 h-10 rounded-full border-2 border-white/20" alt="avatar">
                            <div>
                                <div class="flex items-center gap-1">
                                    <span class="font-bold text-sm">猫猫学姐</span>
                                    <span class="bg-yellow-400 text-black text-[10px] px-1.5 py-0.5 rounded-full font-black">⭐ 5.0</span>
                                </div>
                                <p class="text-[10px] opacity-60">发布于 2小时前</p>
                            </div>
                        </div>
                        <h2 class="text-xl font-black mb-2 tracking-tight">寻找长期图书馆学习搭子 📖</h2>
                        <div class="flex flex-wrap gap-2 mb-3">
                            <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-md border border-white/10">#考研</span>
                            <span class="text-[10px] px-2 py-0.5 bg-white/10 rounded-md border border-white/10">#安静</span>
                            <span class="text-[10px] px-2 py-0.5 bg-secondary/20 text-secondary border border-secondary/30 rounded-md">包咖啡一份</span>
                        </div>
                        <div class="space-y-1.5 text-xs opacity-90">
                            <div class="flex items-center gap-2">
                                <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                                <span>长期有效 · 每天 09:00 - 21:00</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="map-pin" class="w-3.5 h-3.5 text-secondary"></i>
                                <span>国家图书馆附近</span>
                            </div>
                            <div class="flex justify-between items-center pt-2 mt-2 border-t border-white/10">
                                <span class="text-[11px]">已报名人数</span>
                                <span class="font-bold text-secondary">1/2 <span class="text-[10px] font-normal opacity-60">人</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="absolute bottom-10 left-4 right-4 z-30">
                    <button class="apply-btn w-full py-4 rounded-xl btn-gradient text-white font-black text-base active:scale-95 transition-all">
                        👉 立即申请加入
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="absolute bottom-0 left-0 right-0 py-3 pb-8 px-6 glass-info border-t-0 flex justify-between items-center z-50">
            <div class="flex flex-col items-center text-white">
                <i data-lucide="home" class="w-6 h-6 stroke-[2.5px]"></i>
                <span class="text-[10px] mt-1 font-bold">首页</span>
            </div>
            <div class="flex flex-col items-center text-white/50">
                <i data-lucide="compass" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1">搭子</span>
            </div>
            <div class="relative -top-4">
                <div class="w-14 h-12 bg-white rounded-[18px] flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                    <i data-lucide="plus" class="text-black w-8 h-8 stroke-[3px]"></i>
                </div>
            </div>
            <div class="flex flex-col items-center text-white/50 relative">
                <i data-lucide="message-square" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1">消息</span>
                <span class="absolute -top-1 -right-1 w-2 h-2 bg-primary rounded-full"></span>
            </div>
            <div class="flex flex-col items-center text-white/50">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1">我的</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化图标
            lucide.createIcons();

            // 1. 点赞气泡动效
            const actionButtons = document.querySelectorAll('.action-plus');
            actionButtons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const heartIcon = this.querySelector('i');
                    heartIcon.classList.toggle('text-primary');
                    heartIcon.classList.toggle('fill-primary');
                    
                    // 创建气泡弹框
                    for(let i = 0; i < 3; i++) {
                        let timerId = setTimeout(() => {
                            const heart = document.createElement('div');
                            heart.className = 'heart-pop text-primary';
                            heart.innerHTML = '<i data-lucide="heart" class="fill-primary w-6 h-6"></i>';
                            heart.style.left = `${e.clientX - 20 + (Math.random() * 40)}px`;
                            heart.style.top = `${e.clientY - 20}px`;
                            
                            document.body.appendChild(heart);
                            lucide.createIcons();
                            
                            let cleanupId = setTimeout(() => {
                                heart.remove();
                            }, 800);
                        }, i * 100);
                    }
                });
            });

            // 2. 报名按钮交互
            const applyBtns = document.querySelectorAll('.apply-btn');
            applyBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const originalText = this.innerHTML;
                    this.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> 申请中...';
                    lucide.createIcons();
                    
                    let timerId = setTimeout(() => {
                        this.classList.remove('btn-gradient');
                        this.classList.add('bg-secondary');
                        this.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> 申请已发送';
                        lucide.createIcons();
                        
                        // 寻找父级卡片并增加人数
                        const card = this.closest('.card');
                        const countSpan = card.querySelector('.text-secondary');
                        if(countSpan && countSpan.innerText.includes('3/5')) {
                           countSpan.innerHTML = '4/5 <span class="text-[10px] font-normal opacity-60">人</span>';
                        }
                    }, 1200);
                });
            });

            // 3. Tab 切换效果
            const tabs = document.querySelectorAll('.top-12 button');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => {
                        t.classList.remove('tab-active', 'text-white');
                        t.classList.add('text-white/70');
                    });
                    this.classList.add('tab-active', 'text-white');
                    this.classList.remove('text-white/70');
                });
            });

            // 4. 模拟卡片滑入动画 (Entry Animation)
            const cards = document.querySelectorAll('.card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                
                let entryTimer = setTimeout(() => {
                    card.style.transition = 'all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 200);
            });
        });
    </script>
</body>
</html>
